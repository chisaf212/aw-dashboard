<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AW Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F7F6F3;
  --s1:#FFFFFF;
  --s2:#F3F4F6;
  --s3:#EEF0F3;
  --s4:#E5E7EB;
  --bd:#E5E7EB;
  --bd2:#D1D5DB;
  --tx:#111827;
  --t2:#6B7280;
  --t3:#9CA3AF;
  --ac:#E5392A;
  --ac-d:rgba(229,57,42,.08);
  --gr:#059669;
  --rd:#DC2626;
  --bl:#2563EB;
  --pu:#7C3AED;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:12px;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:210px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.body{flex:1;min-width:0}

/* Sidebar */
.sb-logo{
  padding:20px 18px 0;
  font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.3px;
}
.sb-logo span{color:var(--ac)}
.sb-divider{height:1px;background:var(--bd);margin:14px 0}

.sb-nav{padding:0 8px;display:flex;flex-direction:column;gap:1px}
.sb-nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:7px;cursor:pointer;color:var(--t2);
  font-size:12px;font-weight:500;transition:.1s;border:none;background:none;width:100%;text-align:left;
}
.sb-nav-item:hover{background:var(--s2);color:var(--tx)}
.sb-nav-item.on{background:var(--ac-d);color:var(--ac);font-weight:600}
.sb-nav-item svg{flex-shrink:0;width:13px;height:13px;opacity:.5}
.sb-nav-item.on svg{opacity:1}

.sb-section{
  font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--t3);
  padding:10px 18px 4px;text-transform:uppercase;
}

/* Slots */
.sb-slots{padding:0 10px;display:flex;flex-direction:column;gap:5px}
.slot{
  display:flex;align-items:center;gap:10px;padding:10px 11px;
  background:#fff;
  border:1.5px solid var(--bd);
  border-radius:10px;
  cursor:pointer;position:relative;transition:.15s;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.slot:hover{border-color:var(--ac);box-shadow:0 2px 8px rgba(229,57,42,.10);transform:translateY(-1px)}
.slot.ok{
  border-color:rgba(5,150,105,.4);
  background:linear-gradient(135deg,rgba(5,150,105,.03),rgba(5,150,105,.07));
  box-shadow:0 2px 6px rgba(5,150,105,.12);
}
.slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.slot-num{
  width:26px;height:26px;border-radius:8px;
  background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:var(--t2);flex-shrink:0;
  letter-spacing:-.5px;
}
.slot.ok .slot-num{background:rgba(5,150,105,.15);color:var(--gr)}
.slot-info{min-width:0;flex:1}
.slot-label{font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.slot.ok .slot-label{color:var(--tx)}
.slot-sub{font-size:9.5px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-ok{font-size:9.5px;color:var(--gr);margin-top:2px;display:none;font-weight:600}
.slot.ok .slot-ok{display:block}
.slot.ok .slot-sub{display:none}
.slot-clear{
  width:18px;height:18px;border-radius:5px;background:transparent;border:none;
  color:var(--t3);font-size:13px;cursor:pointer;display:none;
  align-items:center;justify-content:center;flex-shrink:0;z-index:2;position:relative;
  transition:.12s;line-height:1;
}
.slot.ok .slot-clear{display:flex}
.slot-clear:hover{color:var(--rd);background:rgba(220,38,38,.1)}

.sb-last{padding:8px 18px;font-size:9px;color:var(--t3)}

/* Header */
.main-header{
  height:52px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 22px;gap:12px;
  background:var(--s1);position:sticky;top:0;z-index:50;
  box-shadow:0 1px 0 var(--bd);
}
.page-title{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.header-right{margin-left:auto;display:flex;gap:10px;align-items:center}

/* Toggle */
.toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2)}
.toggle-lbl.on{color:var(--tx);font-weight:500}
.sw{position:relative;width:32px;height:17px;cursor:pointer;flex-shrink:0}
.sw input{display:none}
.sw-t{position:absolute;inset:0;background:var(--s4);border:1.5px solid var(--bd2);border-radius:9px;transition:.15s}
.sw input:checked~.sw-t{background:var(--ac);border-color:var(--ac)}
.sw-d{position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.sw input:checked~.sw-d{left:18px}

/* Content */
.content{padding:18px 22px}
.page{display:none}.page.on{display:block}
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 24px;gap:16px;color:var(--t3);text-align:center;
}
.empty svg{opacity:.15}
.empty h2{font-size:15px;font-weight:600;color:var(--t2)}
.empty p{font-size:12px;line-height:1.8;color:var(--t3)}

/* KPI flat */
.kpi-grid-flat{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
  gap:6px;margin-bottom:14px;
}
.kpi-card-flat{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:8px;
  padding:10px 12px;
  transition:.12s;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.kpi-card-flat:hover{border-color:var(--bd2);box-shadow:0 2px 6px rgba(0,0,0,.07)}
.kpif-label{
  font-size:9px;color:var(--t3);margin-bottom:5px;
  font-weight:600;text-transform:uppercase;letter-spacing:.06em;
}
.kpif-val{font-size:16px;font-weight:700;letter-spacing:-.4px;line-height:1;color:var(--tx)}
.kpif-rate{font-size:9px;color:var(--t3);margin-top:3px;font-weight:400}
.v-blue{color:var(--bl)}.v-purple{color:var(--pu)}.v-green{color:var(--gr)}
.v-orange{color:var(--ac)}.v-red{color:var(--rd)}.v-dim{color:var(--t3)}

/* Table */
.table-card{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.table-bar{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;border-bottom:1px solid var(--bd);
  background:var(--s1);
}
.table-ttl{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.table-meta{font-size:10px;color:var(--t3);margin-left:auto}

/* 月/週/日 pills */
.view-seg{display:flex;gap:3px;margin-left:6px}
.vseg-btn{
  padding:4px 12px;border:1.5px solid var(--bd);border-radius:20px;cursor:pointer;
  font-family:inherit;font-size:10px;font-weight:600;color:var(--t2);
  background:transparent;transition:.12s;
}
.vseg-btn:hover{border-color:var(--ac);color:var(--ac)}
.vseg-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}

.tscroll{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;min-width:820px;font-size:11px}

thead tr.gh th{
  padding:4px 10px;font-size:8px;font-weight:700;text-align:center;
  letter-spacing:.08em;text-transform:uppercase;
}
.gh-def{background:#F9FAFB;color:var(--t3)}
.gh-blue{background:#EFF6FF;color:#1D4ED8}
.gh-purple{background:#F5F3FF;color:#6D28D9}
.gh-green{background:#ECFDF5;color:#065F46}
.gh-orange{background:#FFF7ED;color:#C2410C}

thead th.ch{
  background:#F9FAFB;padding:8px 10px;font-size:9px;font-weight:600;
  text-align:right;color:var(--t2);white-space:nowrap;
  position:sticky;top:0;z-index:10;
  border-bottom:1px solid var(--bd);border-top:1px solid var(--bd);
}
thead th.ch:first-child{text-align:left;position:sticky;left:0;z-index:20;background:#F9FAFB}
thead th.ch.c-blue{color:var(--bl)}
thead th.ch.c-purple{color:var(--pu)}
thead th.ch.c-green{color:var(--gr)}
thead th.ch.c-orange{color:var(--ac)}

tbody tr{transition:background .08s}
tbody tr:hover{background:#FAFAFA}
td{
  padding:8px 10px;text-align:right;
  border-bottom:1px solid #F3F4F6;
  white-space:nowrap;color:var(--tx);
}
td:first-child{
  text-align:left;color:var(--t2);
  position:sticky;left:0;background:var(--s1);z-index:5;font-weight:500;
}
td.pos{color:var(--gr);font-weight:600}
td.neg{color:var(--rd)}
td.dim{color:var(--t3)}

/* Spin */
.spin{
  width:16px;height:16px;
  border:2px solid var(--bd);border-top-color:var(--ac);
  border-radius:50%;animation:rot .7s linear infinite;display:inline-block;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* Sec */
.sec{margin-bottom:14px}
</style>
</head>
<body>
<div class="layout">

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sb-logo">SnsClub <span>AW</span></div>
  <div class="sb-divider"></div>

  <div class="sb-nav">
    <button class="sb-nav-item on" data-page="p1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      時系列
    </button>
    <button class="sb-nav-item" data-page="p2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      媒体別
    </button>
  </div>

  <div class="sb-divider"></div>
  <div class="sb-section">データソース</div>

  <div class="sb-slots">
    <!-- CSV01 -->
    <div class="slot" id="slot1">
      <input type="file" id="f1" accept=".csv,.xlsx">
      <div class="slot-num">1</div>
      <div class="slot-info">
        <div class="slot-label">AW導線_勉強会</div>
        <div class="slot-sub">LINE登録・AW申込・着席</div>
        <div class="slot-ok" id="so1"></div>
      </div>
      <button class="slot-clear" id="sc1" title="削除">×</button>
    </div>
    <!-- CSV02 -->
    <div class="slot" id="slot2">
      <input type="file" id="f2" accept=".csv,.xlsx">
      <div class="slot-num">2</div>
      <div class="slot-info">
        <div class="slot-label">AW導線_個別相談</div>
        <div class="slot-sub">個別相談申込</div>
        <div class="slot-ok" id="so2"></div>
      </div>
      <button class="slot-clear" id="sc2" title="削除">×</button>
    </div>
    <!-- CSV03: 顧客管理 -->
    <div class="slot" id="slot3">
      <input type="file" id="f3" accept=".csv,.xlsx">
      <div class="slot-num">3</div>
      <div class="slot-info">
        <div class="slot-label">顧客管理シート</div>
        <div class="slot-sub">成約・担当者</div>
        <div class="slot-ok" id="so3"></div>
      </div>
      <button class="slot-clear" id="sc3" title="削除">×</button>
    </div>
    <!-- CSV04: インハウス広告費 -->
    <div class="slot" id="slot4">
      <input type="file" id="f4" accept=".csv,.xlsx">
      <div class="slot-num">4</div>
      <div class="slot-info">
        <div class="slot-label">インハウス広告費</div>
        <div class="slot-sub">「採用」除外→AW対象</div>
        <div class="slot-ok" id="so4"></div>
      </div>
      <button class="slot-clear" id="sc4" title="削除">×</button>
    </div>
    <!-- CSV05: スーア広告費 -->
    <div class="slot" id="slot5">
      <input type="file" id="f5" accept=".csv,.xlsx">
      <div class="slot-num">5</div>
      <div class="slot-info">
        <div class="slot-label">スーア広告費</div>
        <div class="slot-sub">「launch」含む→AW対象</div>
        <div class="slot-ok" id="so5"></div>
      </div>
      <button class="slot-clear" id="sc5" title="削除">×</button>
    </div>
    <!-- CSV06: 有川さんMeta -->
    <div class="slot" id="slot6">
      <input type="file" id="f6" accept=".csv,.xlsx">
      <div class="slot-num">6</div>
      <div class="slot-info">
        <div class="slot-label">有川さんMeta広告費</div>
        <div class="slot-sub">CSV or 固定値を使用</div>
        <div class="slot-ok" id="so6"></div>
      </div>
      <button class="slot-clear" id="sc6" title="削除">×</button>
    </div>
    <!-- CSV07: ウェビナーリスナー -->
    <div class="slot" id="slot7">
      <input type="file" id="f7" accept=".csv,.xlsx">
      <div class="slot-num">7</div>
      <div class="slot-info">
        <div class="slot-label">ウェビナーリスナー</div>
        <div class="slot-sub">AW消化数・着席数</div>
        <div class="slot-ok" id="so7"></div>
      </div>
      <button class="slot-clear" id="sc7" title="削除">×</button>
    </div>
  </div>

  <div class="sb-divider"></div>
  <div class="sb-section">自動読込</div>
  <div style="padding:0 8px 8px">
    <button id="btnFetchAll" style="width:100%;padding:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit">
      ↓ 広告費を今すぐ更新
    </button>
  </div>

  <div class="sb-divider"></div>
  <div style="padding:0 6px 4px">
    <button id="btnClearAll" style="width:100%;padding:6px;background:transparent;border:1px solid var(--bd);border-radius:5px;color:var(--t3);font-size:10px;cursor:pointer;font-family:inherit">全データをリセット</button>
  </div>
  <div class="sb-last" id="lastSaved">未保存</div>
</aside>

<!-- ── Main ── -->
<div class="body">
  <header class="main-header">
    <div class="page-title" id="pageTitle">時系列</div>
    <div class="header-right" id="headerCtrl">
      <label class="toggle">
        <span class="toggle-lbl on" id="lOwn">自社</span>
        <span class="sw"><input type="checkbox" id="aTgl"><span class="sw-t"></span><span class="sw-d"></span></span>
        <span class="toggle-lbl" id="lAg">代理店 +20%</span>
      </label>
    </div>
  </header>

  <div class="content">
    <!-- Page 1: 時系列 -->
    <div class="page on" id="p1">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <h2>CSV 1〜4 をアップロード</h2>
        <p>左のサイドバーからCSVをドロップ<br>次回以降は自動で復元されます</p>
      </div>
    </div>

    <!-- Page 2: 媒体別 -->
    <div class="page" id="p2">
      <div id="pt-media">
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20"/></svg>
          <h2>CSV 5 広告DB連携をアップロード</h2>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ========== State ==========
const D={aw:[],consult:[],customer:[],inhouseAd:[],sueaAd:[],arikawa:[],webinar:[]};
// 有川さんMeta 4月固定値（CSVがない場合に使用）
const ARIKAWA_MANUAL={cost:6109576,reserv:384,reservCPA:15910,note:'4月実績（手数料込み）'};
let view='monthly',agency=false;
let CH={};
const TODAY=new Date();TODAY.setHours(23,59,59,999);
const PRICE_PER_CONTRACT=650000; // 1件あたりの成約単価
const planPrice=p=>PRICE_PER_CONTRACT;

// スプシ直接読込URL（CORS: * 確認済み）
const SHEET_ID='19gxZ97Nw9OfOdCP6cGeKSDfWZi_TcOCVEt_PtJPjczE';
const SHEET_INHOUSE=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=2135903601`;
const SHEET_SUEA   =`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=157755168`;

// ========== LocalStorage ==========
const STORE_KEYS={aw:'aw1',consult:'aw2',customer:'aw4',inhouseAd:'aw5',sueaAd:'aw6',arikawa:'aw7',webinar:'aw8'};
// バージョンが変わったらキャッシュを全クリア
const CACHE_VER='v3.6';
if(localStorage.getItem('aw_ver')!==CACHE_VER){
  Object.values(STORE_KEYS).forEach(k=>localStorage.removeItem(k));
  localStorage.setItem('aw_ver',CACHE_VER);
}

function saveData(key){
  try{
    let mini;
    if(key==='aw')      mini=D.aw.map(r=>({m:r.mgmtId,nm:r.name||'',f:r.flowDate,a:r.applyDate,s:r.schedDate,t:r.attended?1:0}));
    if(key==='consult') mini=D.consult.map(r=>({m:r.mgmtId,n:r.name,d:r.applyDate,ap:r.applied?1:0}));
    if(key==='customer')mini=D.customer.map(r=>({n:r.name,sf:r.staff,d:r.meetDate,rt:r.route,st:r.seatST,as:r.afterST,pl:r.plan}));
    if(key==='inhouseAd') mini=D.inhouseAd.map(r=>({d:r.date,c:r.cost,i:r.imp,cl:r.click}));
    if(key==='sueaAd')    mini=D.sueaAd.map(r=>({d:r.date,c:r.cost,i:r.imp,cl:r.click}));
    if(key==='arikawa')   mini=D.arikawa.map(r=>({d:r.date,c:r.cost}));
    if(key==='webinar')   mini=D.webinar.map(r=>({n:r.name||'',d:r.schedDate,s:r.status,k:r.applyDate}));
    localStorage.setItem(STORE_KEYS[key],JSON.stringify(mini));
    updateSavedTime();
  }catch(e){console.warn('Storage error:',e);}
}

function loadAllFromStorage(){
  const isPastFn=d=>d?new Date(d+'T23:59:59')<=TODAY:false;
  try{
    const r1=JSON.parse(localStorage.getItem('aw1')||'null');
    if(r1) D.aw=r1.map(r=>({mgmtId:r.m,name:r.nm||'',flowDate:r.f,applyDate:r.a,schedDate:r.s,attended:!!r.t,isConsumed:isPastFn(r.s?toJaYMD(r.s):null)}));

    const r2=JSON.parse(localStorage.getItem('aw2')||'null');
    if(r2) D.consult=r2.map(r=>({mgmtId:r.m,name:r.n,applyDate:r.d,applied:!!r.ap}));

    const r4=JSON.parse(localStorage.getItem('aw4')||'null');
    if(r4) D.customer=r4.map(r=>({name:r.n,staff:r.sf,meetDate:r.d,route:r.rt,seatST:r.st,afterST:r.as,plan:r.pl,isConsumed:isPastFn(r.d)}));

    const r5=JSON.parse(localStorage.getItem('aw5')||'null');
    if(r5) D.inhouseAd=r5.map(r=>({date:r.d,cost:r.c,imp:r.i,click:r.cl}));
    const r6=JSON.parse(localStorage.getItem('aw6')||'null');
    if(r6) D.sueaAd=r6.map(r=>({date:r.d,cost:r.c,imp:r.i,click:r.cl}));
    const r8=JSON.parse(localStorage.getItem('aw8')||'null');
    if(r8) D.webinar=r8.map(r=>({name:r.n||'',schedDate:r.d,status:r.s,applyDate:r.k,isConsumed:isPastFn(r.d)}));

    // スロット表示更新
    if(D.aw.length)        markSlot(1,`${D.aw.length}件`);
    if(D.consult.length)   markSlot(2,`${D.consult.length}件`);
    if(D.customer.length)  markSlot(3,`${D.customer.length}件`);

// ========== Date ==========
function toYMD(v){
  if(!v) return null;
  const s=String(v).trim();
  let m=s.match(/(\d{1,2})月(\d{1,2})日/);
  if(m) return `2026-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return null;
}
function toJaYMD(s){ return s; } // schedDateは既にYMD形式で保存
function isPast(d){if(!d)return false;return new Date(d+'T23:59:59')<=TODAY;}
function toYM(d){return d?d.slice(0,7):null;}
function toWeek(d){if(!d)return null;const dt=new Date(d);dt.setDate(dt.getDate()-dt.getDay()+1);return dt.toISOString().slice(0,10);}
function keyFn(d){return view==='monthly'?toYM(d):view==='weekly'?toWeek(d):d;}
const normName=s=>String(s||'').trim().replace(/[\s　]/g,'');

// ========== File reader ==========
async function readFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
  }
  const buf=await file.arrayBuffer();
  let text=null;
  for(const enc of['utf-8','cp932','shift-jis','utf-8-sig']){
    try{text=new TextDecoder(enc,{fatal:true}).decode(buf);break;}catch{}
  }
  if(!text)text=new TextDecoder('utf-8').decode(buf);
  // セル内改行(\n)を正しく処理するパーサー
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'&&text[i+1]==='"'){cell+='"';i++;}  // エスケープ引用符
      else if(c==='"'){inQ=false;}                   // 引用符閉じ
      else if(c!=='\r'){cell+=c;}                    // セル内文字（\nも無視して続行）
    }else{
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(cell||null);cell='';}
      else if(c==='\n'){row.push(cell||null);cell='';rows.push(row);row=[];}
      else if(c!=='\r'){cell+=c;}
    }
  }
  if(cell||row.length>0){row.push(cell||null);rows.push(row);}
  return rows;
}

// ========== Parsers ==========
function parseAW(rows){
  const data=rows.slice(2).filter(r=>r[0]&&/^\d+$/.test(String(r[0]).trim()));
  if(!data.length) return [];
  // 管理ID列を自動検出（8桁以上の数字）: col4 or col5
  const mgmtCol=/^\d{8,}$/.test(String(data[0][4]||'').trim())?4
               :/^\d{8,}$/.test(String(data[0][5]||'').trim())?5
               :null;
  if(mgmtCol!==null){
    const hdr=rows[1]||[];
    // 管理IDの次列がLINE流入日かどうかをヘッダーで判定
    const hasFlowDate=String(hdr[mgmtCol+1]||'').includes('流入');
    const applyCol=mgmtCol+(hasFlowDate?2:1); // 流入日あり→+2, なし→+1
    return data.map(r=>({
      mgmtId:   String(r[mgmtCol]||'').trim(),
      name:     normName(r[1]),
      flowDate: hasFlowDate?(toYMD(r[mgmtCol+1])||'2026-04-01'):'2026-04-01',
      applyDate:r[2]==='1'?(toYMD(r[applyCol])||'2026-04-01'):null,
      schedDate:null,
      attended: r[3]==='1',
      isConsumed:false,
    })).filter(r=>r.mgmtId);
  }else{
    // 旧フォーマット: col2=AW着席, col3=管理ID, col4=流入日, col5=申込日, col6=開催日
    return data.map(r=>({
      mgmtId:   String(r[3]||'').trim(),
      flowDate: toYMD(r[4]),
      applyDate:toYMD(r[5]),schedDate:toYMD(r[6]),
      attended: r[2]==='1',
      isConsumed:isPast(toYMD(r[6])),
    })).filter(r=>r.flowDate);
  }
}
function parseConsult(rows){
  // 新フォーマット: ID,表示名,本名,ステータス：個別相談申込(0/1),管理ID
  // 旧フォーマット: ID,表示名,本名,着席タグ,管理ID,申込日時
  // col3が'0'か'1'なら新フォーマット
  const isNewFmt = rows.slice(2).some(r=>r[3]==='1'||r[3]==='0');
  return rows.slice(2)
    .filter(r=>r[0]&&/^\d+$/.test(String(r[0]).trim()))
    .map(r=>isNewFmt
      ?{mgmtId:String(r[4]||'').trim(), name:normName(r[2]), applied:r[3]==='1', applyDate:toYMD(r[5])}
      :{mgmtId:String(r[4]||'').trim(), name:normName(r[2]), applied:!!r[5], applyDate:toYMD(r[5])}
    ).filter(r=>r.mgmtId||r.name);
}

const ST_PRED=['成約予定（契あり）','成約予定（ライフティ）'];
const ST_LOST=['失注','保留→失注','成約予定→失注','クーリングオフ','ライフティ否決→失注','MLM失注'];
function parseCustomer(rows){

}
// CSV05: インハウス広告費
// col0=アカウント名, col1=日, col2=広告名, col3=IMP, col6=消化金額(JPY), col10=リンククリック
// 「採用」を含む広告名はAW対象外
function parseInhouse(rows){
  // col1=日(YYYY-MM-DD)の行だけを対象→ヘッダー・合計行を自動除外
  const np=v=>{if(!v&&v!==0)return 0;return parseFloat(String(v).replace(/[¥,\s]/g,''))||0;};
  const isDate=v=>/^\d{4}-\d{2}-\d{2}/.test(String(v||'').trim());
  return rows
    .filter(r=>r[1]&&isDate(r[1])&&r[2]&&!String(r[2]).includes('採用'))
    .map(r=>({
      date:  toYMD(r[1]),
      name:  String(r[2]||''),
      cost:  np(r[6]),
      imp:   np(r[3]),
      click: np(r[10]),
    }))
    .filter(r=>r.date&&r.cost>0);
}

// CSV06: スーア広告費
// col0=Day, col1=Campaign name, col2=Adset, col3=Ad Name, col4=Amount spent, col5=Impressions, col6=Link clicks, col7=Leads
// col1に「launch」を含む行がAW対象
function parseSuea(rows){
  // col0=Day(YYYY-MM-DD)の行だけを対象→セル内改行によるRow0問題を回避
  // launch以外がオートウェビナー対象
  const np=v=>{if(!v&&v!==0)return 0;return parseFloat(String(v).replace(/[¥,\s]/g,''))||0;};
  const isDate=v=>/^\d{4}-\d{2}-\d{2}/.test(String(v||'').trim());
  return rows
    .filter(r=>r[0]&&isDate(r[0])&&r[1]&&!String(r[1]).toLowerCase().includes('launch'))
    .map(r=>({
      date:     toYMD(r[0]),

// CSV08: ウェビナーリスナー（AW消化・着席用）
// 申込ID,アカウント名,日程,申込日時,ステータス(参加/キャンセル/--),...
function parseWebinar(rows){
  const isDate=v=>/^\d{4}-\d{2}-\d{2}/.test(String(v||'').trim());
  return rows.filter(r=>r[0]&&/^\d+$/.test(String(r[0]).trim())&&r[2]&&isDate(r[2])).map(r=>({
    name:      normName(r[1]),               // アカウント名（D.awの表示名と照合）
    schedDate: r[2]?r[2].slice(0,10):null,  // 開催日
    applyDate: r[3]?r[3].slice(0,10):null,  // 申込日
    status:    String(r[4]||'').trim(),       // 参加/キャンセル/--
    isConsumed:r[2]?isPast(r[2].slice(0,10)):false,
  })).filter(r=>r.schedDate);
}

// CSV07: 有川さんMeta広告費（フォーマット未定のため日付+消化金額を柔軟に読む）
function parseArikawa(rows){
  const np=v=>{if(!v&&v!==0)return 0;return parseFloat(String(v).replace(/[¥,\s]/g,''))||0;};
  const isDate=v=>/^\d{4}-\d{2}-\d{2}/.test(String(v||'').trim());
  // 日付列を自動検出
  return rows.filter(r=>r.some(v=>isDate(v))).map(r=>{
    const di=r.findIndex(v=>isDate(v));
    const date=toYMD(r[di]);
    const cost=np(r[di+1])||np(r[di+2])||0;
    return{date,cost};
  }).filter(r=>r.date&&r.cost>0);
}

// スプレッドシートからCSV直接fetch（セル内改行対応パーサー使用）
async function fetchSheetCSV(url){
  const res=await fetch(url,{redirect:'follow'});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const text=await res.text();
  // readFileと同じセル内改行対応パーサー
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'&&text[i+1]==='"'){cell+='"';i++;}
      else if(c==='"'){inQ=false;}
      else if(c!=='\r'){cell+=c;}
    }else{
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(cell||null);cell='';}
      else if(c==='\n'){row.push(cell||null);cell='';rows.push(row);row=[];}
      else if(c!=='\r'){cell+=c;}
    }
  }
  if(cell||row.length>0){row.push(cell||null);rows.push(row);}
  return rows;
}

// ========== Linked data ==========
function buildLinked(){
  const awById={};
  for(const r of D.aw){if(r.mgmtId)awById[r.mgmtId]=r;}
  // AW着席済み（attended=true）の管理IDのみに絞る→消化/着席の過剰カウントを防ぐ
  const attendedIds=new Set(D.aw.filter(r=>r.attended&&r.mgmtId).map(r=>r.mgmtId));
  // 個別相談申込者の本名セット（applied=trueのみ）
  const consultAppliedNames=new Set(D.consult.filter(r=>r.applied&&r.name).map(r=>r.name));
  const custByName={};
  for(const r of D.customer){if(r.name&&!custByName[r.name])custByName[r.name]=r;}

  // D.awベースのループ（LINE登録・AW指標用）
  const awUsers=D.aw.map(aw=>{
    const mid=aw.mgmtId;
    const cu=null; // AW側では成約等は別途計算
    return{
      mgmtId:mid,flowDate:aw.flowDate,
      awApplyDate:aw.applyDate,awConsumed:aw.isConsumed,awAttended:aw.attended,
      consultApply:false,consultDate:null,
      reservConsumed:false,reservSeated:false,reservDate:null,
      contracted:false,contractPred:false,lost:false,pending:false,cooling:false,sales:0,
      staff:'',route:'',plan:'',meetDate:null,seatST:'',
    };
  });

  // 個別相談申込者（本名ベース）→顧客管理で消化・着席・成約
  const consultUsers=D.consult
    .filter(r=>r.applied&&r.name)
    .map(r=>{
      const cu=custByName[r.name];
      return{
        mgmtId:r.mgmtId||'',flowDate:null,
        awApplyDate:null,awConsumed:false,awAttended:false,
        consultApply:true,consultDate:r.applyDate||'2026-04-01',
        reservConsumed:!!(cu?.isConsumed),
        reservSeated:cu?.seatST==='着座'||false,
        reservDate:cu?.meetDate||null,
        contracted:cu?ST_C.includes(cu.afterST):false,
        contractPred:cu?ST_PRED.includes(cu.afterST):false,
        lost:cu?ST_LOST.includes(cu.afterST):false,
        pending:cu?.afterST==='保留'||false,
        cooling:cu?.afterST==='クーリングオフ'||false,
        sales:(cu&&ST_C.includes(cu.afterST))?planPrice(cu.plan):0,
        staff:cu?.staff||'',route:cu?.route||'',
        plan:cu?.plan||'',meetDate:cu?.meetDate||null,seatST:cu?.seatST||'',
      };
    });

  return [...awUsers,...consultUsers];
}

// ========== Aggregate ==========
function emptyM(){return{line_reg:0,aw_apply:0,aw_consumed:0,aw_attend:0,consult_apply:0,reserv_consumed:0,reserv_seated:0,contract:0,contract_pred:0,lost:0,pending:0,cooling:0,sales:0,ad_inhouse:0,ad_suea:0,ad_imp:0,ad_click:0};}
function aggregate(){
  const users=buildLinked();const map={};
  const g=k=>{if(!map[k])map[k]=emptyM();return map[k];};
  for(const u of users){
    const kF=keyFn(u.flowDate);if(kF)g(kF).line_reg++;
    // AW申込・消化・着席はLINE流入日基準でカウント（申込日時ではない）
    if(u.awApplyDate&&kF){g(kF).aw_apply++;if(u.awConsumed)g(kF).aw_consumed++;if(u.awAttended)g(kF).aw_attend++;}
    if(u.consultApply&&u.consultDate){const k=keyFn(u.consultDate);if(k)g(k).consult_apply++;}
    if(u.reservDate){const k=keyFn(u.reservDate);if(k){if(u.reservConsumed)g(k).reserv_consumed++;if(u.reservSeated)g(k).reserv_seated++;}}
    if(u.meetDate&&u.seatST==='着座'){const k=keyFn(u.meetDate);if(k){if(u.contracted){g(k).contract++;g(k).sales+=u.sales;}if(u.contractPred)g(k).contract_pred++;if(u.lost)g(k).lost++;if(u.pending)g(k).pending++;if(u.cooling)g(k).cooling++;}}
  }
  // 広告費集計
  for(const r of D.inhouseAd){const k=keyFn(r.date);if(k){g(k).ad_inhouse+=r.cost;g(k).ad_imp+=r.imp;g(k).ad_click+=r.click;}}
  for(const r of D.sueaAd)   {const k=keyFn(r.date);if(k){g(k).ad_suea+=r.cost;g(k).ad_imp+=r.imp;g(k).ad_click+=r.click;}}
  // ウェビナーリスナーCSV → AW申込・消化・着席
  // D.awの名前→LINE流入日マップで照合し、流入日基準で集計
  if(D.webinar.length){
    const nameToFlow={};
    for(const r of D.aw){if(r.name&&r.flowDate)nameToFlow[r.name]=r.flowDate;}
    const wMap={};
    for(const r of D.webinar){
      // 名前でD.awの流入日を検索、なければapplyDate→schedDateにフォールバック
      const fd=r.name?nameToFlow[r.name]:null;
      const k=keyFn(fd||r.applyDate||r.schedDate);if(!k)continue;
      if(!wMap[k])wMap[k]={apply:0,consumed:0,attend:0};
      wMap[k].apply++;
      if(r.isConsumed)wMap[k].consumed++;
      if(r.status==='参加')wMap[k].attend++;
    }
    // 既存のaw_apply/aw_consumed/aw_attendをウェビナーCSVの値で置換
    for(const[k,wm]of Object.entries(wMap)){
      if(!map[k])map[k]=emptyM();
      map[k].aw_apply=wm.apply;
      map[k].aw_consumed=wm.consumed;
      map[k].aw_attend=wm.attend;
    }
  }
  return{map,users};
}
function derive(m){
  const ac=m.aw_consumed||m.aw_apply||0;
  const adTotal=(m.ad_inhouse||0)+(m.ad_suea||0);
  return{...m,
    ad_total:adTotal,
    aw_apply_r:    m.line_reg        ? m.aw_apply/m.line_reg              : null,
    aw_attend_r:   m.aw_apply        ? m.aw_attend/m.aw_apply             : null,
    consult_cvr:   m.aw_attend       ? m.consult_apply/m.aw_attend        : null,
    reserv_seat_r: m.reserv_consumed ? m.reserv_seated/m.reserv_consumed  : null,
    contract_r:    m.reserv_seated   ? m.contract/m.reserv_seated         : null,
    lost_r:        m.reserv_seated   ? m.lost/m.reserv_seated             : null,
    roas:          adTotal&&m.sales  ? m.sales/adTotal*100                : null,
    lcpa:          adTotal&&m.line_reg ? adTotal/m.line_reg               : null,
    cpm:           m.ad_imp>0        ? adTotal/m.ad_imp*1000              : null,
    cpc:           m.ad_click>0      ? adTotal/m.ad_click                 : null,
    ctr:           m.ad_imp>0        ? m.ad_click/m.ad_imp                : null,
  };
}
function sumAll(items){const t=emptyM();items.forEach(i=>{Object.keys(t).forEach(k=>{t[k]+=(i.m[k]||0);});});return derive(t);}
function getItems(){
  const{map}=aggregate();
  return Object.entries(map)
    .filter(([k])=>k && k >= '2026-04')
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([k,m])=>({k,m,d:derive(m)}));
}

    {l:'失注',      v:nm(t.lost)+'件',             r:fp(t.lost_r),                            c:'v-red'},
  ];
  wrap.innerHTML=`<div class="kpi-grid-flat">${cards.map(c=>`
    <div class="kpi-card-flat">
      <div class="kpif-label">${c.l}</div>
      <div class="kpif-val ${c.c}">${c.v}</div>
      ${c.r?`<div class="kpif-rate">${c.r}</div>`:''}
    </div>`).join('')}</div>`;
  return wrap;
}

function mkFunnel(t){
  const wrap=document.createElement('div');
  wrap.className='sec';
  const max=Math.max(t.line_reg||1,1);
  const steps=[
    {l:'LINE登録数',v:t.line_reg,c:'#7aadfa'},
    {l:'AW申込',v:t.aw_apply,c:'#7aadfa'},
    {l:'AW消化数',v:t.aw_consumed,c:'#7dcfff'},
    {l:'AW着席数',v:t.aw_attend,c:'#a78bfa'},
    {l:'個別相談申込',v:t.consult_apply,c:'#a78bfa'},
    {l:'個別消化数',v:t.reserv_consumed,c:'#e07850'},
    {l:'個別着席数',v:t.reserv_seated,c:'#e07850'},
    {l:'成約',v:t.contract,c:'#6ee7b7'},
  ];
  wrap.innerHTML=`<div class="sec-title">ファネル</div>
  <div class="funnel-wrap">${steps.map(s=>{
    const p=max>0&&s.v?Math.max(s.v/max*100,1.5):0;
    return`<div class="funnel-row">
      <div class="funnel-lbl">${s.l}</div>
      <div class="funnel-bar-bg"><div class="funnel-bar" style="width:${p}%;background:${s.c}">
        <span class="funnel-bar-val">${s.v!=null?Math.round(s.v).toLocaleString():''}</span>
      </div></div>
      <div class="funnel-num">${s.v!=null?Math.round(s.v).toLocaleString():'—'}</div>
    </div>`;
  }).join('')}</div>`;
  return wrap;
}

function mkCharts(items){
  const wrap=document.createElement('div');wrap.className='sec';
  const inner=document.createElement('div');inner.className='chart-row';
  const lbs=items.map(i=>fk(i.k));
  inner.innerHTML=`
    <div class="chart-card"><div class="chart-ttl">LINE登録 / AW申込 / AW着席</div><div class="chart-area"><canvas id="ch1"></canvas></div></div>
    <div class="chart-card"><div class="chart-ttl">個別相談申込 / 着席</div><div class="chart-area"><canvas id="ch2"></canvas></div></div>
    <div class="chart-card"><div class="chart-ttl">成約 / 成約予定</div><div class="chart-area"><canvas id="ch3"></canvas></div></div>`;
  wrap.appendChild(inner);
  setTimeout(()=>{
    ['c1','c2','c3'].forEach(k=>{if(CH[k]){CH[k].destroy();delete CH[k];}});
    const base={responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#808080',font:{size:10},boxWidth:10}}},
      scales:{x:{ticks:{color:'#505050',maxRotation:40,font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#505050',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}}};
    const mk=(id,ds)=>{const c=document.getElementById(id);if(c)return new Chart(c,{type:'bar',data:{labels:lbs,datasets:ds},options:base});};
    CH.c1=mk('ch1',[
      {label:'LINE登録',data:items.map(i=>i.m.line_reg||0),backgroundColor:'rgba(122,173,250,.45)',borderColor:'#7aadfa',borderWidth:1},
      {label:'AW申込', data:items.map(i=>i.m.aw_apply||0), backgroundColor:'rgba(125,207,255,.35)',borderColor:'#7dcfff',borderWidth:1},
      {label:'AW着席', data:items.map(i=>i.m.aw_attend||0),backgroundColor:'rgba(167,139,250,.5)',borderColor:'#a78bfa',borderWidth:1},
    ]);
    CH.c2=mk('ch2',[
      {label:'申込',data:items.map(i=>i.m.consult_apply||0),backgroundColor:'rgba(224,120,80,.4)',borderColor:'#e07850',borderWidth:1},
      {label:'着席',data:items.map(i=>i.m.reserv_seated||0),backgroundColor:'rgba(167,139,250,.5)',borderColor:'#a78bfa',borderWidth:1},
    ]);
    CH.c3=mk('ch3',[
      {label:'成約',  data:items.map(i=>i.m.contract||0),     backgroundColor:'rgba(110,231,183,.5)',borderColor:'#6ee7b7',borderWidth:1},
      {label:'成約予定',data:items.map(i=>i.m.contract_pred||0),backgroundColor:'rgba(224,120,80,.4)',borderColor:'#e07850',borderWidth:1},
    ]);
  },30);
  return wrap;
}

const TCOLS=[
  ['期間','_k','k',''],
  ['売上','sales','yen','c-orange'],['ROAS','roas','roas','c-orange'],['広告費','ad_total','yen','c-orange'],
  ['LINE登録','line_reg','num','c-blue'],['AW申込','aw_apply','num','c-blue'],
  ['AW申込率','aw_apply_r','pct','c-blue'],['AW消化','aw_consumed','num','c-blue'],
  ['AW着席','aw_attend','num','c-blue'],['AW着席率','aw_attend_r','pct','c-blue'],
  ['個別申込','consult_apply','num','c-purple'],['個別CVR','consult_cvr','pct','c-purple'],
  ['個別消化','reserv_consumed','num','c-purple'],['個別着席','reserv_seated','num','c-purple'],
  ['着席CVR','reserv_seat_r','pct','c-purple'],
  ['成約','contract','num','c-green'],['成約予定','contract_pred','num','c-orange'],
  ['成約CVR','contract_r','pct','c-green'],['失注','lost','num','c-green'],
  ['失注率','lost_r','pct','c-green'],
];
const TGRPS=[{l:'',cols:1,cls:'gh-def'},{l:'売上 · 広告',cols:3,cls:'gh-orange'},{l:'LINE · AW',cols:6,cls:'gh-blue'},{l:'個別相談',cols:5,cls:'gh-purple'},{l:'成約',cols:5,cls:'gh-green'}];
function fmtC(v,t){if(t==='k')return fk(v);if(t==='yen')return yen(v);if(t==='num')return nm(v);if(t==='pct')return fp(v);if(t==='roas')return v==null?'—':v.toFixed(1)+'%';return v??'—';}
// 月/週/日切り替え（テーブルバーのボタンから呼ぶ）
function setView(v){
  view=v;
  renderP1();
}

function mkTable(items){
  const wrap=document.createElement('div');wrap.className='sec table-card';
  const gHd=TGRPS.map(g=>`<th colspan="${g.cols}" class="${g.cls}">${g.l}</th>`).join('');
  const sHd=TCOLS.map(([l,,,c])=>`<th class="ch ${c}">${l}</th>`).join('');
  const tbody=items.map(({k,m,d})=>{
    const cells=TCOLS.map(([,key,,])=>{
      const raw=key==='_k'?k:d[key]??m[key];
      const t=TCOLS.find(c=>c[1]===key)?.[2]||'';const v=fmtC(raw,t);
      let ex='';if(key==='sales'&&m.sales>0)ex='pos';if(key==='contract'&&m.contract>0)ex='pos';if(key==='lost_r'&&d.lost_r>0.6)ex='neg';
      return`<td class="${ex}">${v}</td>`;
    }).join('');
    return`<tr>${cells}</tr>`;
  }).join('');
  // 月/週/日ボタンをテーブルタイトル横に配置
  const btns=['monthly','weekly','daily'].map(v=>
    `<button class="vseg-btn${view===v?' on':''}" onclick="setView('${v}')">${{monthly:'月',weekly:'週',daily:'日'}[v]}</button>`
  ).join('');
  wrap.innerHTML=`
    <div class="table-bar">
      <span class="table-ttl">期間別</span>
      <div class="view-seg">${btns}</div>
      <span class="table-meta" style="margin-left:auto">${items.length}行</span>
    </div>
    <div class="tscroll"><table><thead><tr class="gh">${gHd}</tr><tr>${sHd}</tr></thead><tbody>${tbody}</tbody></table></div>`;
  return wrap;
}

     extra:[{l:'IMP',v:nm(sueaImp)},{l:'Click',v:nm(sueaClick)}]},
    {k:'有川さんMeta',       cost:arikawaCost,note:arikawaNote, has:true,
     extra:[{l:'予約数',v:nm(ARIKAWA_MANUAL.reserv)},{l:'予約CPA',v:yen(ARIKAWA_MANUAL.reservCPA)}]},
  ];

  const hd=['媒体','広告費（手数料込み）','補足①','補足②','備考'].map(l=>`<th class="ch">${l}</th>`).join('');

      <td class="${m.cost>0?'pos':''}">${yen(m.cost)}</td>

  el.innerHTML=`<div class="table-card">
    <div class="table-bar"><span class="table-ttl">媒体別 広告費</span><span class="table-meta">合計 ${yen(totalAdCost)}</span></div>
    <div class="tscroll"><table><thead><tr>${hd}</tr></thead><tbody>${bd}</tbody></table></div>

// ========== File handlers ==========
async function handleFile(file,key,slotNum,parser){
  try{
    const raw=await readFile(file);
    D[key]=parser(raw);
    saveData(key);
    markSlot(slotNum,`${D[key].length}件`);
    if(D[key].length===0){
      const preview=raw.slice(0,3).map(r=>r.slice(0,4).join(' | ')).join('\n');
      alert(`⚠️ ${file.name}\n読込: ${raw.length}行 → 抽出: 0件\n\n先頭3行:\n${preview}`);
    }
    render();
  }catch(e){alert('エラー: '+e.message);console.error(e);}
}
function setupSlot(slotId,inputId,clearId,key,num,parser){
  const sl=document.getElementById(slotId);
  const inp=document.getElementById(inputId);
  const clr=document.getElementById(clearId);
  const go=f=>{handleFile(f,key,num,parser);};
  inp.addEventListener('change',e=>{if(e.target.files[0])go(e.target.files[0]);});
  sl.addEventListener('dragover',e=>{e.preventDefault();sl.style.borderColor='var(--acc)';});
  sl.addEventListener('dragleave',()=>{sl.style.borderColor='';});
  sl.addEventListener('drop',e=>{e.preventDefault();sl.style.borderColor='';const f=e.dataTransfer.files[0];if(f)go(f);});
  clr.addEventListener('click',e=>{e.stopPropagation();clearData(key);});
}
setupSlot('slot1','f1','sc1','aw',1,parseAW);
setupSlot('slot2','f2','sc2','consult',2,parseConsult);
setupSlot('slot3','f3','sc3','customer',3,parseCustomer);
setupSlot('slot4','f4','sc4','inhouseAd',4,parseInhouse);
setupSlot('slot5','f5','sc5','sueaAd',5,parseSuea);
setupSlot('slot6','f6','sc6','arikawa',6,parseArikawa);
setupSlot('slot7','f7','sc7','webinar',7,parseWebinar);

// スプシ自動読み込みボタン
document.getElementById('btnFetchAll').addEventListener('click',async()=>{
  const btn=document.getElementById('btnFetchAll');
  btn.textContent='読込中...';btn.disabled=true;
  let ok=0,err=[];
  try{
    const r1=await fetchSheetCSV(SHEET_INHOUSE);

    saveData('inhouseAd');
    markSlot(4,`${D.inhouseAd.length}件`);

  }catch(e){err.push('インハウス: '+e.message);}
  try{
    const r2=await fetchSheetCSV(SHEET_SUEA);
    D.sueaAd=parseSuea(r2);
    saveData('sueaAd');
    markSlot(5,`${D.sueaAd.length}件`);
    ok++;
  }catch(e){err.push('スーア: '+e.message);}
  btn.textContent=`↓ スプシから広告費を読込`;btn.disabled=false;
  if(err.length) alert('エラー:\n'+err.join('\n')+'\n\n→ CSVをダウンロードしてスロット4・5にドロップしてください');
  else if(ok===2) alert(`読込完了！\nインハウス: ${D.inhouseAd.length}件\nスーア: ${D.sueaAd.length}件`);
  render();
});

// 広告費をページロード時に自動フェッチ（24時間キャッシュ）
async function autoFetchAds(){
  const lastFetch=localStorage.getItem('aw_ads_fetched');
  const now=Date.now();
  // 24時間以内にフェッチ済みならスキップ
  if(lastFetch&&now-Number(lastFetch)<86400000&&D.inhouseAd.length&&D.sueaAd.length) return;
  try{
    const [r1,r2]=await Promise.all([
      fetchSheetCSV(SHEET_INHOUSE).catch(()=>null),
      fetchSheetCSV(SHEET_SUEA).catch(()=>null),
    ]);
    let updated=false;
    if(r1&&r1.length>2){D.inhouseAd=parseInhouse(r1);saveData('inhouseAd');markSlot(4,`${D.inhouseAd.length}件`);updated=true;}
    if(r2&&r2.length>2){D.sueaAd=parseSuea(r2);saveData('sueaAd');markSlot(5,`${D.sueaAd.length}件`);updated=true;}
    if(updated){localStorage.setItem('aw_ads_fetched',String(now));render();}
  }catch(e){console.warn('広告費自動取得エラー:',e);}
}
autoFetchAds();

  if(!confirm('全データをリセットしますか？')) return;
  Object.values(STORE_KEYS).forEach(k=>localStorage.removeItem(k));
  localStorage.removeItem('aw_ver');
  location.reload();
});
